<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AeroHub Connector</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">
                <!-- Para produção seria um ficheiro local como logo_main.png -->
                <img src="https://via.placeholder.com/80/121212/ffffff?text=AeroHub" alt="AeroHub Logo">
            </div>
            <h1>AeroHub Connector</h1>
            <p class="subtitle">Sincronize o seu voo com o Discord</p>
        </header>

        <main>
            <div class="form-group">
                <label for="userId">Infinite Flight ID ou Callsign</label>
                <input type="text" id="userId" placeholder="Insira o seu ID..." autocomplete="off">
            </div>

            <button id="connectBtn" class="btn-primary">CONECTAR AO RADAR</button>
            <button id="disconnectBtn" class="btn-secondary" style="display: none;">DESCONECTAR</button>

            <div class="status-box">
                <p id="statusText" class="status disconnected">🔴 Desconectado</p>
            </div>
        </main>

        <footer>
            <p>&copy; 2026 AeroHub Network</p>
        </footer>
    </div>
    <script src="renderer.js"></script>
</body>
</html>
