name: Construir Conector AeroHub
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Localizar e Instalar
        shell: bash
        run: |
          # Procura onde está o ficheiro package.json e entra nessa pasta
          TARGET_DIR=$(find . -name package.json -not -path "*/node_modules/*" -exec dirname {} \;)
          echo "Projeto encontrado em: $TARGET_DIR"
          cd "$TARGET_DIR"
          npm install
          npm run build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload do Instalador
        uses: softprops/action-gh-release@v2
        with:
          files: "**/*.exe" # Procura qualquer .exe gerado em qualquer pasta
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
